services:
  db:
    image: postgres:16-alpine
    container_name: medirdv_db
    environment:
      POSTGRES_USER: medirdv_user
      POSTGRES_PASSWORD: medirdv_password
      POSTGRES_DB: medirdv_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medirdv_user -d medirdv_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: medirdv_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: medirdv_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  adminer:
    image: adminer
    container_name: medirdv_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
